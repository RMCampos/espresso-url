---

services:
  postgres:
    image: postgres:16
    container_name: url-postgres
    environment:
      POSTGRES_USER: quarkus
      POSTGRES_PASSWORD: quarkus
      POSTGRES_DB: urldb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quarkus -d urldb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: url-backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://quarkus:quarkus@postgres:5432/urldb?schema=public
      BUILD_VERSION: v1.0.0
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    container_name: url-frontend
    environment:
      VITE_SERVER_URL: http://backend:3000
      VITE_BUILD: v1.0.0
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
